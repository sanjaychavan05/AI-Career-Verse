# ============================================
# AI Career Verse - Application Configuration
# ============================================

# Server
server.port=8080

# ============================================
# H2 In-Memory Database Configuration
# ============================================
spring.datasource.url=jdbc:h2:mem:ai_career_verse_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console - accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Gemini AI Configuration
# ============================================
gemini.api.key=AIzaSyDZwUK2bift7h5Ke2fwYrCXHRShoLW4yac
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta

# ============================================
# File Upload
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# GitHub API
# ============================================
github.api.base-url=https://api.github.com

# ============================================
# Logging
# ============================================
logging.level.root=INFO
logging.level.com.aicareerverse=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================
# Application Info
# ============================================
spring.application.name=ai-career-verse
